---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    {%- if page.last_modified_at -%}
      <p class="post-meta">Last updated: {{ page.last_modified_at | date: "%b %-d, %Y" }}</p>
    {%- endif -%}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
